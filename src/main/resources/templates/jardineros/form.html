<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Jardinero</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        principal: '#85C88A',
                        naranja: '#FFD166',
                        azulClaro: '#CFEAF5',
                        verde: '#2F7A3E',
                        oscuro: '#0B3B51'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gradient-to-br from-[#85C88A] via-[#CFEAF5] to-white min-h-screen">

<div class="flex min-h-screen">

    <!-- SIDEBAR -->
    <div th:replace="fragments/layout :: sidebar('jardineros')"></div>

    <!-- CONTENIDO -->
    <main class="flex-1 p-6 lg:p-10">

        <!-- HEADER -->
        <section class="page-header">

            <div>
                <small>Gestión de Jardineros</small>

                <h1 th:text="${jardinero.id_jardinero == null} ? 'Registrar Jardinero' : 'Editar Jardinero'">
                    Registrar Jardinero
                </h1>

                <p>
                    Completa la información del jardinero para registrarlo o actualizar sus datos.
                </p>
            </div>

            <div class="buttons">
                <a th:href="@{/view/jardineros}" class="btn-custom btn-verde">
                    ← Volver
                </a>
            </div>

        </section>

        <!-- FORMULARIO -->
        <section class="bg-white rounded-[30px] shadow-xl overflow-hidden">

            <div class="bg-[#0B3B51] px-8 py-6">
                <h2 class="text-2xl font-bold text-white">
                    Datos del Jardinero
                </h2>
                <p class="text-[#CFEAF5] mt-1">
                    Los campos marcados con * son necesarios para guardar la información.
                </p>
            </div>

            <form th:action="@{/view/jardineros/save}"
                  th:object="${jardinero}"
                  method="post"
                  novalidate
                  class="p-8">

                <input type="hidden" th:field="*{id_jardinero}" />

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <!-- NOMBRE -->
                    <div>
                        <label class="block mb-2 font-bold text-[#0B3B51]">
                            Nombre *
                        </label>
                        <input type="text"
                               th:field="*{nombre}"
                               required
                               placeholder="Ingrese el nombre completo"
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition focus:border-[#85C88A] focus:ring-4 focus:ring-[#85C88A]/20">
                    </div>

                    <!-- DOCUMENTO -->
                    <div>
                        <label class="block mb-2 font-bold text-[#0B3B51]">
                            Documento *
                        </label>
                        <input type="text"
                               th:field="*{documento}"
                               required
                               placeholder="CC, TI, CE, etc."
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition focus:border-[#85C88A] focus:ring-4 focus:ring-[#85C88A]/20">
                    </div>

                    <!-- DIRECCIÓN -->
                    <div>
                        <label class="block mb-2 font-bold text-[#0B3B51]">
                            Dirección *
                        </label>
                        <input type="text"
                               th:field="*{direccion}"
                               required
                               placeholder="Ingrese la dirección"
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition focus:border-[#85C88A] focus:ring-4 focus:ring-[#85C88A]/20">
                    </div>

                    <!-- ROL -->
                    <div>
                        <label class="block mb-2 font-bold text-[#0B3B51]">
                            Rol *
                        </label>
                        <select th:field="*{rol}"
                                required
                                class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition focus:border-[#85C88A] focus:ring-4 focus:ring-[#85C88A]/20">
                            <option value="">Seleccione un rol</option>
                            <option value="Jardinero">Jardinero</option>
                            <option value="Supervisor">Supervisor</option>
                            <option value="Administrador">Administrador</option>
                            <option value="Asistente">Asistente</option>
                        </select>
                    </div>

                </div>

                <!-- BOTONES -->
                <div class="flex flex-col sm:flex-row justify-end gap-4 mt-8 pt-6 border-t border-gray-100">

                    <a th:href="@{/view/jardineros}"
                       class="btn-custom btn-verde justify-center">
                        ← Volver
                    </a>

                    <button type="submit"
                            class="btn-custom btn-principal justify-center">
                        💾 Guardar Jardinero
                    </button>

                </div>

            </form>

        </section>

    </main>

</div>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
